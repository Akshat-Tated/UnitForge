server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls — uses Docker's internal DNS resolver
    # resolver 127.0.0.11 defers hostname lookup to request time
    # so nginx starts even when orchestrator container isn't running
    location /api {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $upstream http://orchestrator:8080;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Cache static assets
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}